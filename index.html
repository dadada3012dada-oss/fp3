<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP3級 赤ペンドリル</title>
<style>
:root{
  --paper:#F7F6F2;
  --card:#FFFFFF;
  --ink:#22303C;
  --ink-soft:#5B6B78;
  --shu:#C33C25;        /* 採点の朱色 */
  --shu-soft:#F6E3DE;
  --line:#E3E0D8;
  --rule:#D8D4C8;
  --ok-bg:#FBF1EE;
  --gold:#8A6D2F;
  --gold-bg:#F5EFDF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px}
body{
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic Medium","Noto Sans JP",sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.65;
}
.serif{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif}
#app{max-width:1080px;margin:0 auto;padding:0 14px 80px}

/* ---------- ヘッダー ---------- */
header.top{
  padding:26px 2px 14px;
  border-bottom:3px double var(--rule);
  margin-bottom:18px;
}
header.top h1{font-size:1.55rem;letter-spacing:.06em}
header.top h1 .maru{color:var(--shu)}
header.top p{color:var(--ink-soft);font-size:.85rem;margin-top:4px}
.totalbar{display:flex;align-items:center;gap:12px;margin-top:12px;flex-wrap:wrap}
.totalbar .num{font-size:1.05rem}
.totalbar .num b{color:var(--shu);font-size:1.4rem}
.bar{flex:1;min-width:140px;height:9px;background:var(--line);border-radius:9px;overflow:hidden}
.bar i{display:block;height:100%;background:var(--shu);border-radius:9px;transition:width .4s}

/* ---------- ホーム：分野カード ---------- */
.section-label{font-size:.8rem;letter-spacing:.25em;color:var(--ink-soft);margin:26px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:"";flex:1;height:1px;background:var(--rule)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:16px 16px 13px;position:relative;
}
.card.mock{border-color:#D9CBA8;background:linear-gradient(180deg,#FFFEFA,#FBF7EC)}
.card .no{position:absolute;top:12px;right:14px;font-size:.72rem;color:var(--ink-soft);letter-spacing:.1em}
.card h3{font-size:1.02rem;margin-bottom:2px}
.card .sub{font-size:.78rem;color:var(--ink-soft)}
.card .stat{display:flex;align-items:baseline;gap:8px;margin:10px 0 6px}
.card .stat b{font-size:1.35rem;color:var(--shu)}
.card .stat span{font-size:.8rem;color:var(--ink-soft)}
.card .stat .xcnt{color:var(--ink);font-size:.8rem;margin-left:auto}
.card .stat .xcnt em{font-style:normal;color:var(--shu);font-weight:700}
.card .bar{height:7px;margin-bottom:12px}
.btnrow{display:flex;gap:7px;flex-wrap:wrap}
button{font-family:inherit;cursor:pointer}
.btn{
  border:1.5px solid var(--ink);background:var(--card);color:var(--ink);
  border-radius:7px;padding:7px 14px;font-size:.85rem;font-weight:600;
  transition:.15s;
}
.btn:hover{background:var(--ink);color:#fff}
.btn.shu{border-color:var(--shu);color:var(--shu)}
.btn.shu:hover{background:var(--shu);color:#fff}
.btn.ghost{border-color:var(--line);color:var(--ink-soft)}
.btn.ghost:hover{background:var(--line);color:var(--ink)}
.btn:disabled{opacity:.35;cursor:default}
.btn:disabled:hover{background:var(--card);color:var(--ink-soft)}
.hint{font-size:.78rem;color:var(--ink-soft);margin-top:14px}

/* ---------- クイズ画面 ---------- */
.quizbar{
  position:sticky;top:0;z-index:20;background:var(--paper);
  padding:12px 2px 10px;border-bottom:2px solid var(--rule);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
}
.quizbar .title{font-size:1rem;font-weight:700;flex:1;min-width:150px}
.quizbar .prog{font-size:.85rem;color:var(--ink-soft)}
.quizbar .prog b{color:var(--shu);font-size:1.05rem}
.colhead{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  margin:16px 0 6px;font-size:.75rem;letter-spacing:.2em;color:var(--ink-soft);
}
.qrow{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  margin-bottom:12px;align-items:stretch;
}
.qcell,.acell{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:14px 14px 12px;position:relative;
}
.qcell.marked-o{background:var(--ok-bg);border-color:#E7C3BA}
.qcell.marked-x{border-color:var(--shu);border-width:1.5px}
.qno{font-size:.72rem;color:var(--ink-soft);letter-spacing:.08em;margin-bottom:4px;display:flex;gap:8px;align-items:center}
.star{color:var(--gold);letter-spacing:.05em}
.qtext{font-size:.93rem}
.choices{margin-top:8px;font-size:.88rem;color:var(--ink-soft)}
.choices div{padding:1px 0}
.markrow{display:flex;gap:8px;margin-top:12px;align-items:center}
.markrow .lbl{font-size:.72rem;color:var(--ink-soft);margin-right:2px}
.mark{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--line);background:var(--card);
  font-size:1.15rem;font-weight:700;color:#B9B4A8;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.mark:hover{border-color:var(--shu);color:var(--shu)}
.mark.on{border-color:var(--shu);color:var(--shu);background:var(--shu-soft);transform:scale(1.06);box-shadow:0 1px 4px rgba(195,60,37,.25)}
/* 解答セル */
.acell{border-left:3px solid var(--shu)}
.acell .ans{font-weight:700;color:var(--shu);font-size:1rem;margin-bottom:5px}
.acell .exp{font-size:.87rem}
.acell .goro{
  margin-top:9px;background:var(--gold-bg);border-radius:7px;
  padding:8px 10px;font-size:.83rem;color:#4d3d17;
}
.acell .goro b{color:var(--gold)}
.acell.hidden .inner{visibility:hidden}
.cover{
  position:absolute;inset:0;border-radius:9px;
  background:repeating-linear-gradient(-45deg,#F1EFE8,#F1EFE8 8px,#EBE8DF 8px,#EBE8DF 16px);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-soft);font-size:.85rem;letter-spacing:.15em;cursor:pointer;
}
.cover:hover{color:var(--shu)}
.acell:not(.hidden) .cover{display:none}
.empty{
  text-align:center;color:var(--ink-soft);padding:60px 10px;font-size:.95rem;
}
.backwrap{margin-top:26px;text-align:center}

/* 模試の点数表示 */
.scorebox{
  margin:4px 0 16px;background:var(--card);border:1px solid #D9CBA8;border-radius:10px;
  padding:12px 16px;font-size:.9rem;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
}
.scorebox b{font-size:1.5rem;color:var(--shu)}
.scorebox .pass{font-weight:700}
.scorebox .pass.ok{color:var(--shu)}

@media(max-width:640px){
  html{font-size:13.5px}
  .qrow,.colhead{gap:7px}
  .qcell,.acell{padding:11px 10px 10px}
  .mark{width:36px;height:36px}
}
</style>
</head>
<body>
<div id="app"></div>

{q:"自動車損害賠償責任保険（自賠責保険）では、対人賠償事故と対物賠償事故の両方が補償の対象となる。",a:"×",e:"自賠責は対人賠償のみ。物損は対象外。限度額は被害者1人につき死亡3,000万円・傷害120万円・後遺障害4,000万円。",g:"語呂「自賠責は ヒトだけ、サンゼン・イチニーマル」。任意保険の対人・対物は無制限にでき、飲酒運転でも被害者救済のため保険金は支払われる、も頻出。",star:3},
{q:"普通傷害保険では、国内旅行中に発生した細菌性食中毒は補償の対象とならない。",a:"○",e:"普通傷害保険は「急激かつ偶然な外来の事故」が対象で、細菌性食中毒・靴ずれ・熱中症・地震によるケガは対象外。国内旅行傷害保険なら食中毒は対象、海外旅行保険なら食中毒も地震のケガも対象。",g:"表で暗記：食中毒→普通×・国内旅行○・海外○／地震のケガ→普通×・国内×・海外○。「海外は全部面倒みてくれる」と覚える。",star:2},
{q:"個人賠償責任保険では、被保険者が自転車で通行人に衝突しケガをさせた場合の損害賠償責任は補償の対象となる。",a:"○",e:"日常生活の賠償事故（自転車事故・飼い犬の咬傷・買物中に商品を壊した等）が対象。業務中の事故・自動車事故・預かり物の損壊は対象外。生計を共にする同居親族・別居の未婚の子も被保険者になる。",g:"企業向けは名前から判断：PL保険＝売った物が原因／施設所有者賠償＝施設の欠陥／受託者賠償＝預かり品。",star:2},
{q:"生命保険契約のクーリング・オフは、契約の申込日または申込みの撤回等に関する事項を記載した書面の交付日のいずれか遅い日から（　）以内であれば、書面等により申込みを撤回できる。",c:["1. 8日","2. 14日","3. 20日"],a:"1. 8日",e:"「いずれか遅い日」から8日以内に、書面または電磁的記録で撤回。口頭では不可。",g:"語呂「やっ(8)ぱりやめた」。告知は「聞かれたことに答える」義務（自発的申告ではなく、募集人への口頭伝達は告知にならない）も頻出。",star:3},
{q:"地震保険の保険金額は、主契約である火災保険の保険金額の（ ① ）の範囲内で設定し、建物は（ ② ）が上限となる。",c:["1. ①30〜50%　②5,000万円","2. ①50〜80%　②3,000万円","3. ①30〜50%　②1,000万円"],a:"1. ①30〜50%　②5,000万円",e:"地震保険は単独加入不可（火災保険に付帯）。建物5,000万円・家財1,000万円が上限。火災保険では地震・噴火・津波の損害は補償されない、が大前提の頻出論点。",g:"語呂「地震はサンゴ(30〜50)で、建物ゴセン・家財イッセン」。4種の割引（建築年・耐震等級・免震・耐震診断）は重複適用不可、保険料に会社間の差はない、も覚える。",star:3},
{q:"契約者（保険料負担者）＝夫、被保険者＝夫、死亡保険金受取人＝妻である生命保険契約において、妻が受け取る死亡保険金は（　）の課税対象となる。",c:["1. 所得税","2. 相続税","3. 贈与税"],a:"2. 相続税",e:"契約者＝被保険者→相続税（相続人が受取なら500万円×法定相続人の非課税枠）。契約者＝受取人→所得税（一時所得）。3者バラバラ→贈与税。",g:"覚え方「払った人が死んだ→相続税／払った人が受け取る→所得税／全員違う→贈与税」。この3パターンは学科・実技とも毎回級の頻出。",star:3},
{q:"2012年以降に締結した生命保険契約の保険料に係る一般生命保険料控除の控除限度額（所得税）は（　）である。",c:["1. 40,000円","2. 50,000円","3. 120,000円"],a:"1. 40,000円",e:"新制度は一般・個人年金・介護医療の3区分×各4万円＝合計12万円（所得税）。住民税は各2.8万円・合計7万円。傷害特約など「身体の傷害のみ」に係る保険料は対象外。",g:"語呂「新制度は ヨン・ヨン・ヨンで12」。地震保険料控除＝所得税は全額（最高5万円）・住民税は半分（最高2.5万円）とセットで暗記。",star:3},
{q:"生命保険会社が破綻した場合、生命保険契約者保護機構は、高予定利率契約を除き、原則として（　）の90%まで補償する。",c:["1. 死亡保険金額","2. 責任準備金等","3. 既払込保険料総額"],a:"2. 責任準備金等",e:"「保険金額の90%」ではなく「責任準備金等の90%」。責任準備金＝将来の保険金支払いに備えて積み立てているお金。",g:"あわせて：一時払養老保険等を5年以内に解約すると金融類似商品として20.315%源泉分離課税。入院給付金・手術給付金など身体の傷害に基因する給付金は非課税。",star:2},
]},
{id:"ch3",name:"第3章 金融資産運用",sub:"経済指標・債券・株式・投信・NISA",qs:[
{q:"日銀短観の業況判断DIは、業況が「良い」と回答した企業の割合から「悪い」と回答した企業の割合を差し引いて算出される。",a:"○",e:"日銀短観は日本銀行が年4回、企業に直接アンケートする調査。DI＝「良い」−「悪い」（%ポイント）。",g:"公表元の暗記が最重要：GDP・景気動向指数＝内閣府／短観・マネーストック＝日銀／CPI＝総務省。語呂「ナイカクはGDP、ニチギンは短観」。有効求人倍率＝一致系列、完全失業率＝遅行系列も頻出。",star:3},
{q:"日本銀行が売りオペレーションを行うと、市場の資金量が増加し、金利は低下しやすくなる。",a:"×",e:"売りオペ＝日銀が債券を売る＝市場からお金を吸収→金利は上昇。買いオペ＝お金を供給→金利低下。",g:"覚え方「日銀が売る→世の中のカネが減る→カネの値段（金利）は上がる」。米金利上昇（日米金利差拡大）→円安ドル高要因、もセットで。",star:3},
{q:"外貨預金は、預金保険制度による保護の対象である。",a:"×",e:"外貨預金は対象外。国内銀行の円預金は1金融機関につき元本1,000万円＋利息まで保護、決済用預金（無利息・要求払・決済サービス）は全額保護。",g:"語呂「ガイカはガード外」。証券会社破綻は日本投資者保護基金で1,000万円まで（銀行で買った投信は対象外）も頻出対比。",star:3},
{q:"市場金利が上昇すると、既に発行されている固定利付債券の価格は下落する。",a:"○",e:"金利と債券価格は逆の動き（シーソーの関係）。価格が下がれば利回りは上がる。格付けが下がった場合も価格下落→利回り上昇。",g:"覚え方「新しい債券の方が利率が良くなる→古い債券は人気が落ちて値下がり」。格付けBBB以上＝投資適格、BB以下＝投機的の境界線も暗記。",star:3},
{q:"投資信託の信託財産留保額は、投資信託を解約する際に投資家が負担し、販売会社の収入となる。",a:"×",e:"信託財産留保額は解約者が負担するが、販売会社の収入ではなく信託財産の中に残る（残った投資家のためのペナルティ的コスト）。",g:"3つのコスト：購入時手数料（無し＝ノーロード）／信託報酬（保有中ずっと日々差引き）／信託財産留保額（解約時・財産に残る）。「留保＝とどまる」と字で覚える。",star:2},
{q:"J-REITの分配金は配当所得となり、確定申告で総合課税を選択すれば配当控除の適用を受けられる。",a:"×",e:"J-REITの分配金は配当所得だが、配当控除は適用不可（法人段階で法人税がほぼかかっていないため）。外国株式の配当も配当控除不可。",g:"配当控除が使えるのは「総合課税を選んだ国内株式の配当」だけ。申告分離課税を選ぶと配当控除×・損益通算○、総合課税は配当控除○・損益通算×という対比が最頻出。",star:2},
{q:"2つの資産の相関係数が−1に近いほど、分散投資によるリスク低減効果は大きくなる。",a:"○",e:"相関係数は−1〜＋1。−1＝真逆に動く→リスク低減効果最大、＋1＝同じ動き→効果なし。ポートフォリオの期待収益率は各資産の期待収益率の加重平均。",g:"あわせてオプション：コール＝買う権利／プット＝売る権利。買い手の損失はプレミアムに限定、売り手は無限定。満期まで長いほどプレミアムは高い。",star:3},
{q:"NISA口座で生じた上場株式の譲渡損失は、特定口座の譲渡益と損益通算することができる。",a:"×",e:"NISA口座の損失は「なかったもの」とみなされ、損益通算も3年間の繰越控除もできない。NISA最大の注意点。",g:"課税口座なら：譲渡損は申告分離課税を選んだ配当と通算でき、翌年以後3年間繰越可。税率20.315%も基本数字として暗記。",star:3},
{q:"表面利率1%、残存期間4年の固定利付債券を額面100円あたり98円で購入した場合の最終利回り（単利）は（　）である。",c:["1. 1.02%","2. 1.53%","3. 2.04%"],a:"2. 1.53%",e:"最終利回り＝｛表面利率＋（額面100−購入価格）÷残存年数｝÷購入価格×100＝｛1＋(100−98)÷4｝÷98×100＝1.5÷98×100≒1.53%。",g:"公式の型「（利息＋値上がり益の年割り）÷買った値段」。分母は必ず購入価格。個人向け国債＝変動10年/固定5年/固定3年・最低金利0.05%・1万円から・1年経過で換金可、も同分野の頻出。",star:3},
{q:"株価1,200円、1株当たり純利益60円、1株当たり純資産800円の場合、この会社のPERは（　）である。",c:["1. 1.5倍","2. 15倍","3. 20倍"],a:"3. 20倍",e:"PER＝株価÷1株当たり純利益＝1,200÷60＝20倍（低いほど割安）。なおPBR＝株価÷1株当たり純資産＝1,200÷800＝1.5倍。",g:"語呂「PERのEはEarnings（利益）、PBRのBはBook（純資産）」。ROE＝当期純利益÷自己資本×100（高いほど効率的）も3点セットで暗記。",star:3},
{q:"株価800円、1株当たり年間配当金20円の場合、配当利回りは（　）である。",c:["1. 2.5%","2. 4.0%","3. 25%"],a:"1. 2.5%",e:"配当利回り＝配当金÷株価×100＝20÷800×100＝2.5%。分母を純利益にすると「配当性向」になってしまう（配当性向＝配当総額÷当期純利益×100）。",g:"覚え方「利回りは値段に対して・性向は儲けに対して」。受渡し＝約定日から3営業日目、権利確定日の2営業日前までに買付、も株式売買の頻出数字。",star:3},
{q:"個人向け国債は、原則として発行から（　）経過すれば中途換金できる。",c:["1. 6ヵ月","2. 1年","3. 2年"],a:"2. 1年",e:"発行後1年経過で中途換金可（直前2回分の利子相当額×0.79685が差し引かれる）。最低金利0.05%保証・1万円単位・毎月発行。",g:"語呂「国債は 1年たったら レイテンレイゴ（0.05）」。",star:3},
{q:"ベンチマークを上回る運用成果を目指す投資信託の運用手法を（　）という。",c:["1. パッシブ運用","2. アクティブ運用","3. インデックス運用"],a:"2. アクティブ運用",e:"上回るのを目指す＝アクティブ（信託報酬は高め）、連動を目指す＝パッシブ（インデックス）。",g:"アクティブの手法4つ：トップダウン（マクロ→銘柄）／ボトムアップ（個別企業の積上げ）／グロース（成長性）／バリュー（割安）。「上から下から・伸びるか安いか」で整理。日経平均＝225銘柄・値がさ株の影響大、TOPIX＝時価総額加重、の対比も頻出。",star:2},
{q:"新NISAのつみたて投資枠の年間投資上限額は（ ① ）、成長投資枠は（ ② ）である。",c:["1. ①40万円　②120万円","2. ①120万円　②240万円","3. ①240万円　②120万円"],a:"2. ①120万円　②240万円",e:"つみたて120万円＋成長240万円＝年最大360万円。両枠併用可・非課税期間は無期限・生涯投資枠1,800万円（うち成長投資枠は最大1,200万円）。売却すると翌年、簿価分の枠が復活。",g:"語呂「つみたてイチニー・成長ニーヨン・生涯イッパチ」。ETFは指値・成行・信用取引も可、という上場商品の特徴も同分野で頻出。",star:3},
]},
{id:"ch4",name:"第4章 タックスプランニング",sub:"所得10種・所得控除・申告",qs:[
{q:"給与所得者が受け取る通勤手当は、月額15万円を限度に所得税が非課税となる。",a:"○",e:"通勤手当は月15万円まで非課税。他の非課税所得：遺族年金・障害年金、雇用保険の給付、宝くじ、身体の傷害に基因する保険金、生活用動産の譲渡益。",g:"覚え方「かわいそう系・生活必需系は非課税」。所得税は申告納税方式・超過累進税率（5〜45%）・暦年課税という基本もここで確認。",star:2},
{q:"不動産の貸付を事業的規模で行っている場合、その賃貸収入に係る所得は事業所得となる。",a:"×",e:"不動産の貸付による所得は、規模を問わず不動産所得。事業的規模（5棟10室）かどうかで変わるのは青色申告特別控除65万円が使えるか等であって、所得区分は変わらない。",g:"あわせて：敷金のうち返還を要しない部分は受け取った年の収入に計上する、も不動産所得の定番論点。",star:3},
{q:"上場株式の譲渡により生じた損失は、給与所得と損益通算することができる。",a:"×",e:"損益通算できる損失は「不・事・山・譲」（不動産・事業・山林・譲渡所得）だが、株式の譲渡損は申告分離課税の枠内（配当等）でしか通算できず、給与所得とは通算不可。",g:"語呂「フ・ジ・サン・ジョウ（富士山上）だけ通算」。例外2つ：①不動産所得の損失のうち土地取得の借入金利子は不可 ②生活に通常必要でない資産（別荘・ゴルフ会員権等）の譲渡損は不可。",star:3},
{q:"16歳未満の扶養親族は、扶養控除の対象とならない。",a:"○",e:"扶養控除は16歳以上が対象。一般38万円／特定扶養親族（19歳以上23歳未満）63万円／老人48万円（同居老親等58万円）。",g:"語呂「大学生はロクサン（63万）」。配偶者控除は本人所得1,000万円以下が要件、という所得制限も頻出。",star:3},
{q:"医療費控除は、年末調整によって適用を受けることができる。",a:"×",e:"医療費控除・寄附金控除・雑損控除の3つは年末調整不可で確定申告が必要。医療費控除額＝（医療費−保険金等）−10万円（上限200万円）。",g:"語呂「イ・キ・ザツ（医・寄・雑）は自分で申告」。人間ドックは異常が見つかり治療した場合のみ対象、セルフメディケーション税制とは選択適用（併用不可）も頻出。",star:3},
{q:"住宅借入金等特別控除（住宅ローン控除）の適用を受ける給与所得者は、最初の年分についても年末調整のみで適用を受けることができる。",a:"×",e:"1年目は確定申告が必要（2年目以降は年末調整でOK）。控除率0.7%・原則13年間・床面積50㎡以上・合計所得2,000万円以下・返済期間10年以上が主な要件。",g:"語呂「ローン控除は レーテンナナ(0.7)で ジュウサン(13)年」。要件の数字「50㎡・2,000万円・10年」も3点セットで暗記。",star:3},
{q:"勤続年数25年で退職し退職金を受け取った場合の退職所得控除額は（　）である。",c:["1. 1,000万円","2. 1,150万円","3. 1,250万円"],a:"2. 1,150万円",e:"勤続20年超：800万円＋70万円×（25−20）＝1,150万円。退職所得＝（収入−控除額）×1/2。勤続年数の1年未満は切上げ。",g:"語呂「20年までヨンジュウ、超えたらナナジュウ」。「退職所得の受給に関する申告書」を提出すれば源泉徴収で完結し確定申告不要、も頻出。",star:3},
{q:"一時所得の金額の計算上、特別控除額は最高（ ① ）であり、総所得金額に算入されるのは一時所得の金額の（ ② ）である。",c:["1. ①50万円　②2分の1","2. ①110万円　②2分の1","3. ①50万円　②全額"],a:"1. ①50万円　②2分の1",e:"一時所得＝総収入−支出−特別控除50万円。総所得金額へはその2分の1を算入。生命保険の満期保険金（契約者＝受取人）が代表例。",g:"覚え方「一時のことだから 50引いて 半分こ」。110万円は贈与税の基礎控除なので混ぜないこと。",star:3},
{q:"所得税において、特定扶養親族（19歳以上23歳未満）に係る扶養控除の額は（　）である。",c:["1. 38万円","2. 48万円","3. 63万円"],a:"3. 63万円",e:"特定扶養親族63万円。一般38万円・老人扶養親族48万円・同居老親等58万円との区別が毎回問われる。",g:"語呂「サンパチが基本、大学生ロクサン、おじいちゃん同居でゴッパー(58)」。",star:3},
{q:"損益通算の対象となる損失は、不動産所得・（　）・山林所得・譲渡所得の損失である。",c:["1. 事業所得","2. 一時所得","3. 雑所得"],a:"1. 事業所得",e:"「不・事・山・譲」。一時所得・雑所得（副業の赤字・仮想通貨の損など）の損失は通算できない。",g:"語呂「フジサンジョウ（富士山上）で通算」。",star:3},
{q:"事業所得者が青色申告の適用を受けようとする場合、原則としてその年の（　）までに青色申告承認申請書を提出しなければならない。",c:["1. 2月16日","2. 3月15日","3. 12月31日"],a:"2. 3月15日",e:"その年の3月15日まで（1月16日以後の開業なら開業から2ヵ月以内）。対象は不動産・事業・山林所得（不・事・山）。",g:"特典3つ：①特別控除65万円（事業的規模＋正規の簿記＋e-Tax等。なければ55万・簡易10万）②純損失の3年間繰越控除 ③青色事業専従者給与（配偶者控除と併用不可）。「ロクゴーはイータックス」と覚える。",star:2},
{q:"給与所得者のうち、その年中の給与収入の金額が（　）を超える者は、所得税の確定申告をしなければならない。",c:["1. 1,000万円","2. 1,500万円","3. 2,000万円"],a:"3. 2,000万円",e:"給与収入2,000万円超は年末調整されないため確定申告が必要。ほかに「給与・退職以外の所得が20万円超」「2ヵ所以上から給与」も申告が必要なケース。",g:"語呂「ニセンマンエンで年調卒業」。確定申告期間は翌年2月16日〜3月15日（贈与税は2月1日〜3月15日と開始日が違う点に注意）。",star:2},
]},
{id:"ch5",name:"第5章 不動産",sub:"登記・借地借家・建築基準法・税",qs:[
{q:"不動産登記には公信力が認められているため、登記記録を信頼して取引した者は原則として保護される。",a:"×",e:"不動産登記に公信力はない。真の権利者でない者を登記だけ信じて取引しても保護されない。なお登記事項証明書は誰でも交付請求できる。",g:"対比で覚える：対抗力はある（登記すれば第三者に主張できる）が、公信力はない。仮登記には対抗力もない（順位保全のみ）。",star:3},
{q:"抵当権に関する登記事項は、登記記録の権利部乙区に記録される。",a:"○",e:"表題部＝物理的現況／権利部甲区＝所有権／権利部乙区＝所有権以外（抵当権・賃借権など）。",g:"語呂「コウ区はショ有権、オツ区はソレ以外」（甲＝所、乙＝それ以外）。",star:3},
{q:"相続税路線価は、地価公示の公示価格の70%を価格水準の目安として設定されている。",a:"×",e:"路線価は公示価格の80%、固定資産税評価額が70%。路線価＝国税庁・毎年1/1、固定資産税評価額＝市町村・3年ごと評価替え、公示価格＝国交省・1/1、基準地価格＝都道府県・7/1。",g:"語呂「ロセンはハチ(80)、コテイはナナ(70)」。基準地価格だけ7月1日、も定番ひっかけ。",star:3},
{q:"宅地建物取引業者と締結する専任媒介契約の有効期間は、3ヵ月を超えることができない。",a:"○",e:"専任・専属専任とも最長3ヵ月。専属専任は自己発見取引も不可・1週間に1回以上報告・5営業日以内に指定流通機構へ登録。一般媒介は制限なし。",g:"覚え方「縛りがきつくなるほど、業者の義務も重くなる」。手付＝解約手付が原則で、相手が履行に着手するまで買主は放棄・売主は倍返しで解除、も超頻出。",star:2},
{q:"事業用定期借地権等の設定を目的とする契約は、公正証書によって締結しなければならない。",a:"○",e:"事業用定期借地権（10年以上50年未満）は公正証書限定・居住用建物は不可。一般定期借地権（50年以上）は書面（電磁的記録可）であればよく用途自由。",g:"語呂「ジギョウはコウセイ（公正証書）、イッパンはショメン」。普通借地権は30年以上（短く定めても30年）も対比で暗記。",star:3},
{q:"定期借家契約では、契約期間を1年未満とすることはできない。",a:"×",e:"定期借家は1年未満でも有効。普通借家で1年未満と定めると「期間の定めのない契約」とみなされる。この対比が頻出。定期借家は書面（電磁的記録可）で契約し、更新なしの旨を事前説明する義務。",g:"覚え方「定期は何でもキッチリ約束どおり・普通は借主保護で融通」。普通借家の更新拒絶には貸主の正当事由が必要、もセット。",star:2},
{q:"市街化調整区域とは、すでに市街地を形成している区域およびおおむね10年以内に優先的かつ計画的に市街化を図るべき区域である。",a:"×",e:"設問は市街化区域の説明。市街化調整区域は「市街化を抑制すべき区域」。用途地域を定めるのは市街化区域。",g:"語呂「チョウセイはヨクセイ（調整＝抑制）」。市街化区域内の開発許可は1,000㎡以上、市街化区域内の農地転用は届出でOK（許可不要）もあわせて頻出。",star:3},
{q:"個人が相続により不動産を取得した場合、不動産取得税は課されない。",a:"○",e:"相続による取得は非課税。贈与による取得には課税される。課税標準は固定資産税評価額（宅地は×1/2の特例）。なお登録免許税は相続登記にも課税される。",g:"覚え方「取得税は『もらいに行った』ら課税、『降ってきた』相続は非課税」。消費税は土地の譲渡・貸付が非課税、建物の譲渡は課税、も税の分類問題で頻出。",star:3},
{q:"建築基準法上、建築物の敷地は原則として幅員（ ① ）以上の道路に（ ② ）以上接していなければならない。",c:["1. ①4m　②2m","2. ①2m　②4m","3. ①4m　②1m"],a:"1. ①4m　②2m",e:"接道義務＝幅員4m以上の道路に2m以上。幅員4m未満の2項道路は中心線から2m後退（セットバック）し、その部分は建蔽率・容積率の計算に算入されない。",g:"語呂「ヨンの道にニで接する」。建蔽率の緩和＝角地+10%・防火地域内の耐火建築物+10%（80%地域なら100%に）も頻出。",star:3},
{q:"幅員6mの市道に面する敷地（指定容積率400%・住居系用途地域・法定乗数4/10）における容積率の上限は（　）である。",c:["1. 240%","2. 400%","3. 600%"],a:"1. 240%",e:"前面道路が12m未満の場合、指定容積率と「幅員×法定乗数」の小さい方。6m×4/10＝240%＜400%なので240%。",g:"手順を型で暗記「12m未満→掛け算して小さい方」。住居系4/10・その他6/10。敷地が2つの用途地域にまたがる→広い方の用途規制、防火規制は厳しい方、も頻出。",star:3},
{q:"固定資産税の課税標準の特例により、小規模住宅用地（200㎡以下の部分）の課税標準は、固定資産税評価額の（　）となる。",c:["1. 2分の1","2. 3分の1","3. 6分の1"],a:"3. 6分の1",e:"住宅用地200㎡以下＝1/6（200㎡超部分は1/3）。固定資産税は1月1日現在の所有者に課税され、年の途中で売却してもその年の納税義務者は変わらない。",g:"語呂「コテイは ロクブンノイチ、トシケイ（都市計画税）は サンブンノイチ」。標準税率1.4%も暗記。",star:3},
{q:"土地・建物の譲渡所得の長期・短期の区分は、譲渡した年の（ ① ）における所有期間が（ ② ）を超えるかどうかで判定する。",c:["1. ①1月1日　②5年","2. ①譲渡日　②5年","3. ①1月1日　②10年"],a:"1. ①1月1日　②5年",e:"「譲渡した年の1月1日時点」で5年超＝長期（20.315%）、5年以下＝短期（39.63%）。「譲渡日時点」とするひっかけが最頻出。取得費不明なら概算取得費＝譲渡価額×5%。",g:"語呂「オショウガツに5年たってるか見る」。長期20.315%・短期39.63%は「長いと約2割・短いと約4割」で覚える。",star:3},
{q:"居住用財産を譲渡した場合の3,000万円特別控除は、所有期間が（　）でも適用を受けられる。",c:["1. 5年以下","2. 5年超に限る","3. 10年超に限る"],a:"1. 5年以下",e:"3,000万円控除は所有期間を問わない。10年超が要件なのは軽減税率の特例（3,000万円控除後の6,000万円以下部分が14.21%）で、両者は併用可。配偶者・直系血族への譲渡には使えない。",g:"整理「3,000万控除＝期間不問／軽減税率＝10年超」。空き家の3,000万円控除（1981年5月31日以前建築等）も名前だけ押さえる。",star:3},
{q:"区分所有建物の建替え決議には、区分所有者および議決権の各（　）以上の賛成が必要である。",c:["1. 過半数","2. 4分の3","3. 5分の4"],a:"3. 5分の4",e:"建替え＝5分の4以上、規約の設定・変更＝4分の3以上、一般的事項＝過半数。集会は年1回以上招集。",g:"語呂「建替えはゴシ（5分の4）ゴシ建て直す、規約はシブ（4分の3）シブ変える」。",star:3},
]},
{id:"ch6",name:"第6章 相続・事業承継",sub:"贈与税・民法・相続税・財産評価",qs:[
{q:"書面によらない贈与契約は、その履行が終わっていない部分については、各当事者が解除することができる。",a:"○",e:"口頭の贈与は履行前なら解除可、履行後は不可。贈与は諾成契約（口頭でも成立）。",g:"死因贈与（死んだらあげる＝契約・承諾必要）は相続税の対象、遺贈（遺言による一方的行為）も相続税、と課税関係もセットで覚える。",star:3},
{q:"死因贈与により取得した財産は、贈与税の課税対象となる。",a:"×",e:"死因贈与で取得した財産は相続税の課税対象。「贈与」という名前に釣られないこと。",g:"覚え方「死をきっかけに動く財産は全部相続税」（遺贈・死因贈与・生命保険金）。",star:3},
{q:"相続の放棄をしようとする者は、他の共同相続人全員と共同で家庭裁判所に申述しなければならない。",a:"×",e:"放棄は単独でできる（相続開始を知った時から3ヵ月以内に家庭裁判所へ）。全員共同が必要なのは限定承認。放棄者は初めから相続人でなかったものとみなされ、その子は代襲相続できない。",g:"語呂「ホウキはヒトリで掃ける、ゲンテイはミンナで」。3ヵ月（放棄）・4ヵ月（準確定申告）・10ヵ月（相続税申告）の期限3兄弟も必須暗記：「ミ・シ・ジュウ」。",star:3},
{q:"公正証書遺言の作成には証人2人以上の立会いが必要であり、推定相続人はその証人になることができない。",a:"○",e:"証人になれないのは未成年者・推定相続人・受遺者およびその配偶者・直系血族。公正証書遺言は検認不要。自筆証書遺言は検認必要（法務局保管なら不要）で、財産目録はパソコン作成可。",g:"遺言は15歳から・いつでも撤回可・日付の新しいものが優先。「利害関係者は証人NG」と理屈で覚える。",star:3},
{q:"被相続人の兄弟姉妹には、遺留分が認められていない。",a:"○",e:"遺留分権利者は配偶者・子（代襲含む）・直系尊属のみ。割合は原則1/2（直系尊属のみが相続人なら1/3）。侵害額請求は知った時から1年で時効。",g:"覚え方「遠い親戚（兄弟）に最低保障なし」。兄弟姉妹は相続でも代襲が甥・姪までで止まる、2割加算の対象、と「冷遇3点セット」でまとめて覚える。",star:3},
{q:"相続税の計算において、相続を放棄した者がいる場合、その放棄者は基礎控除額の計算上の「法定相続人の数」に含めない。",a:"×",e:"放棄者も「法定相続人の数」に含める（基礎控除・死亡保険金非課税枠とも）。養子は実子がいれば1人・いなければ2人まで算入。",g:"覚え方「税金計算は放棄を無視」（民法上は放棄者は最初からいなかった扱い、税法上は数に入れる、の対比）。",star:3},
{q:"香典返しの費用は、相続税の課税価格の計算上、債務控除の対象となる。",a:"×",e:"香典返し・法要費用・墓地購入の未払金・遺言執行費用は控除不可。通夜・葬式費用、借入金、未払税金は控除可。",g:"覚え方「葬式そのものはOK、その後のお付き合い・あの世グッズはNG」。",star:2},
{q:"相続税の配偶者の税額軽減の適用を受けるためには、婚姻期間が20年以上でなければならない。",a:"×",e:"配偶者の税額軽減（1億6,000万円または法定相続分まで無税）に婚姻期間の要件はない。ただし申告が要件（税額0でも申告必要）。婚姻20年が要件なのは贈与税の配偶者控除（居住用不動産2,000万円）。",g:"語呂「贈与のニマルニセン（20年・2,000万）、相続はイチロク（1.6億）」。この混同ひっかけは毎回級。",star:3},
{q:"贈与税の暦年課税における基礎控除額は、受贈者1人につき年間（　）である。",c:["1. 60万円","2. 110万円","3. 2,500万円"],a:"2. 110万円",e:"受贈者ベースで年110万円（複数人からもらっても合計110万円）。申告・納付は翌年2月1日〜3月15日（所得税の2/16と開始日が違う）。",g:"語呂「贈与はニガツツイタチから」。教育資金一括贈与1,500万円・結婚子育て1,000万円・住宅資金（省エネ1,000万/一般500万）の非課税制度も金額だけ暗記。",star:3},
{q:"相続時精算課税制度を選択した場合、特別控除（ ① ）を超えた部分に一律（ ② ）の税率で贈与税が課される。",c:["1. ①2,500万円　②20%","2. ①2,000万円　②15%","3. ①2,500万円　②10%"],a:"1. ①2,500万円　②20%",e:"60歳以上の父母・祖父母→18歳以上の子・孫。特別控除2,500万円＋2024年からは年110万円の基礎控除も別枠で使える。一度選ぶと暦年課税に戻れない。",g:"語呂「ニコニコ(2500)超えたらニジュッパー(20%)」。「戻れない」は最頻出の○×ポイント。",star:3},
{q:"被相続人の相続人が妻・長男・長女の3人である場合、妻の法定相続分は（　）である。",c:["1. 2分の1","2. 3分の2","3. 4分の3"],a:"1. 2分の1",e:"配偶者＋子→配偶者1/2・子1/2（長男・長女は各1/4）。養子・非嫡出子の相続分も実子・嫡出子と同じ。",g:"配偶者の取り分は相手が遠くなるほど増える：子と→1/2、親と→2/3、兄弟と→3/4。「分母が2・3・4と増える」と覚える。",star:3},
{q:"相続人が配偶者と被相続人の母である場合、配偶者の法定相続分は（　）である。",c:["1. 2分の1","2. 3分の2","3. 4分の3"],a:"2. 3分の2",e:"配偶者＋直系尊属→配偶者2/3・直系尊属1/3。",g:"代襲相続も頻出：子の代襲は孫→ひ孫と続くが、兄弟姉妹の代襲は甥・姪まで。放棄者の子は代襲不可（欠格・廃除なら代襲可）。",star:3},
{q:"法定相続人が妻・長男・二男の3人である場合、相続税の基礎控除額は（　）である。",c:["1. 4,200万円","2. 4,800万円","3. 5,400万円"],a:"2. 4,800万円",e:"基礎控除＝3,000万円＋600万円×法定相続人の数＝3,000万＋600万×3＝4,800万円。",g:"語呂「サンゼンとロッピャク」。相続税は法定相続分どおりに取得したと仮定して総額を出してから按分する2段階計算、という流れも理解しておく。",star:3},
{q:"相続人が受け取った死亡保険金の非課税限度額は、「（　）×法定相続人の数」の算式で計算される。",c:["1. 300万円","2. 500万円","3. 600万円"],a:"2. 500万円",e:"死亡保険金・死亡退職金それぞれ「500万円×法定相続人の数」。放棄者が受け取った保険金には非課税枠の適用なし（数には含める）。",g:"弔慰金の非課税：業務上死亡＝普通給与3年分、業務外＝6ヵ月分。「ゴヒャク・サンネン・ロッカゲツ」でまとめて暗記。",star:3},
{q:"相続税の申告書は、相続の開始があったことを知った日の翌日から（ ① ）以内に、（ ② ）の住所地の所轄税務署長に提出しなければならない。",c:["1. ①10ヵ月　②被相続人","2. ①4ヵ月　②相続人","3. ①10ヵ月　②相続人"],a:"1. ①10ヵ月　②被相続人",e:"10ヵ月以内・被相続人（亡くなった人）の住所地。「相続人の住所地」は誤り。",g:"期限3兄弟「ミ（3ヵ月放棄）・シ（4ヵ月準確定申告）・ジュウ（10ヵ月相続税申告）」。",star:3},
{q:"小規模宅地等の特例において、特定居住用宅地等は（ ① ）を限度面積として評価額の（ ② ）が減額される。",c:["1. ①330㎡　②80%","2. ①400㎡　②80%","3. ①200㎡　②50%"],a:"1. ①330㎡　②80%",e:"特定居住用330㎡・80%減／特定事業用400㎡・80%減／貸付事業用200㎡・50%減。配偶者が自宅敷地を取得した場合は居住継続・保有要件なしで適用可。",g:"語呂「自宅はサンサンマル・ハチマル、商売ヨンヒャク・ハチマル、貸してニヒャク・ゴーマル」。宅地評価の式（貸宅地＝自用地×(1−借地権割合)、貸家建付地＝自用地×(1−借×借家30%×賃貸割合)）も実技頻出。",star:3},
]},
{id:"ch7",name:"第7章 弱点補強（頻出の穴）",sub:"公式試験で出た未収録論点を集中攻略",qs:[
{q:"中小企業退職金共済（中退共）の掛金は、その全額を事業主が負担し、その一部を従業員に負担させることはできない。",a:"○",e:"中退共の掛金は全額事業主負担で、従業員への負担転嫁は不可。国が掛金の一部を助成する制度もある。従業員の退職金を社外に積み立てる中小企業向けの制度。",g:"「全額事業主負担」つながりで整理：労災保険料・中退共の掛金＝全額事業主／健康保険・厚生年金＝労使折半。「事業主が全部持つ2つ」とセットで暗記。",star:2},
{q:"生命保険の契約者貸付制度では、契約している生命保険の死亡保険金額を上限として、保険会社から貸付を受けることができる。",a:"×",e:"契約者貸付の上限は「死亡保険金額」ではなく、その時点の解約返戻金の一定範囲内（一般に7〜9割程度）。解約せずに資金を借りられる制度で、利息が付く。",g:"覚え方「借りられるのは“今解約したら戻る額”まで」。自動振替貸付（保険料の立替）と混同しないこと。どちらも解約返戻金が原資。",star:2},
{q:"消費者契約法によれば、事業者が重要事項について事実と異なることを告げ、消費者が事実であると誤認して契約の申込みをした場合、消費者はその申込みを取り消すことができる。",a:"○",e:"不実告知・断定的判断の提供・不利益事実の不告知などがあった場合、消費者は契約を取り消せる。取消権は追認できる時から1年（または契約から5年）で時効。",g:"3法の守備範囲を区別：消費者契約法＝取消し（不当な勧誘）・無効（不当な契約条項）／金融サービス提供法＝重要事項の説明義務違反で損害賠償／クーリングオフ＝無条件撤回。「ダマされたら取消し・説明不足なら賠償」で覚える。",star:3},
{q:"保険法によれば、保険給付を請求する権利は、これを行使できる時から（　）行使しないときは時効によって消滅する。",c:["1. 6ヵ月間","2. 1年間","3. 3年間"],a:"3. 3年間",e:"保険金・保険料返還の請求権の消滅時効は3年。忘れたころに気づいても3年以内なら請求できる。",g:"保険の時効「請求は3年」。あわせて告知義務違反による解除は、保険会社が知ってから1ヵ月／契約から5年で解除権が消滅、も押さえる。",star:2},
{q:"相続開始前3年以内（順次7年以内へ延長）に被相続人から暦年課税による贈与を受けた財産は、その受贈者が相続や遺贈で財産を取得しなかった場合には、原則として相続税の課税対象とならない。",a:"○",e:"生前贈与加算（持ち戻し）の対象になるのは、相続や遺贈で財産を取得した人が受けた贈与に限られる。相続で何も取得しない人（例：孫など）への贈与は原則加算されない。",g:"覚え方「相続でもらう人だけ持ち戻し」。加算期間は2024年贈与分から3年→7年へ段階的に延長、延長された4年分は合計100万円まで加算不要。相続時精算課税を選んだ分は別枠で年110万円の基礎控除分が加算対象外。",star:3},
{q:"相続により取得した土地を一定期間内に譲渡した場合、支払った相続税額のうち一定額を取得費に加算できる「相続税の取得費加算の特例」は、相続税の申告期限の翌日以後（　）を経過する日までの譲渡が対象である。",c:["1. 1年","2. 3年","3. 5年"],a:"2. 3年",e:"相続開始の翌日から相続税の申告期限（10ヵ月）の翌日以後3年を経過する日まで、つまり実質「相続開始から3年10ヵ月以内」の譲渡が対象。譲渡益にかかる所得税を軽減できる。",g:"語呂「取得費加算は サンネン・イチジュウ（3年10ヵ月）」。空き家の3,000万円控除とは別制度なので混同しないこと。",star:2},
{q:"「特定の居住用財産の買換えの場合の長期譲渡所得の課税の特例」の適用を受けた場合、買換資産の取得費は譲渡資産の取得費を引き継ぎ、取得時期も引き継ぐ。",a:"×",e:"買換え特例では、取得費は引き継ぐ（＝譲渡益への課税が将来に繰り延べられる）が、取得時期は引き継がない（買換資産を新たに取得した日が取得日）。課税の免除ではなく“先送り”である点が重要。",g:"覚え方「買換えは“税金の繰り延べ”、3,000万円控除は“税金が消える”」。買換え特例と3,000万円特別控除は併用不可、どちらが得か選ぶ。",star:3},
{q:"確定拠出年金（iDeCo・企業型）の老齢給付金は、年金として受け取るほか、一時金として一括で受け取ることもできる。",a:"○",e:"受取方法は年金・一時金・その併用から選べる。年金受取は公的年金等控除、一時金受取は退職所得控除の対象となり、受け取り方で税負担が変わる。原則60歳から受給可能。",g:"あわせて：iDeCoの掛金は全額“小規模企業共済等掛金控除”、運用益は非課税、受取時も控除あり、という「入口・運用・出口すべて優遇」が最大の特徴。",star:2},
{q:"個人年金保険（確定年金）では、年金支払開始後、被保険者が生存している場合に限り年金が支払われる。",a:"×",e:"確定年金は、被保険者の生死にかかわらず契約で定めた一定期間、年金が支払われる（死亡しても遺族が残りを受け取る）。生存している間だけなのは終身年金・有期年金。",g:"3種類を区別：終身年金＝生きている限り一生（長生きで得・女性は保険料高い）／有期年金＝一定期間かつ生存中のみ／確定年金＝一定期間は生死問わず必ず。「“確定”＝必ずもらえる」と字で覚える。",star:2},
{q:"火災保険の車両保険や建物の火災保険から個人が受け取った、損害をてん補するための保険金は、原則として非課税である。",a:"○",e:"損害保険金のうち「損害のてん補（実損の穴埋め）」にあたるものは非課税。事業用建物が焼失して受け取った火災保険金も、事業所得ではなく非課税。ケガの入院給付金なども身体の傷害に基因するため非課税。",g:"覚え方「穴埋めの保険金はもうけじゃないから非課税」。ただし満期返戻金・契約者配当や、契約者と受取人が異なる死亡保険金など“利得”が出るものは課税対象になる。",star:2},
{q:"土地の有効活用における事業受託方式では、有効活用の企画から建設資金の調達、建物の管理・運営までのすべてをデベロッパーが行い、土地所有者は資金を負担しない。",a:"×",e:"事業受託方式は企画・建設・管理などの業務をデベロッパーに委託するが、建設資金は土地所有者が負担する（借入も所有者名義）。資金を自己負担しないのは等価交換方式（土地を提供し、完成した建物を持分で取得）。",g:"方式の区別：等価交換＝自己資金不要・土地の権利を一部手放す／事業受託＝業務は任せるが資金は自分／建設協力金＝テナントが建設資金を出す。「タダで建つのは等価交換だけ」。",star:2},
]},

{q:"弁護士資格を有しないFPが、顧客の遺産分割調停において相手方相続人との交渉を代理して行うことは、弁護士法に抵触しない。",a:"×",e:"個別の法律事務の代理は弁護士の独占業務。FPは民法の一般的な解説や、公正証書遺言の証人になることはできる。",star:3},

{q:"遺族厚生年金の年金額は、原則として死亡した者の老齢厚生年金の報酬比例部分の（　）に相当する額である。",c:["1. 2分の1","2. 3分の2","3. 4分の3"],a:"3. 4分の3",e:"報酬比例部分の3/4。短期要件では被保険者期間が300月未満でも300月とみなして計算する。",star:2},

{q:"海外旅行（傷害）保険では、旅行中の地震によるケガや細菌性食中毒も補償の対象となる。",a:"○",e:"海外旅行保険は最も補償範囲が広い。「普通×国内△海外○」の表を思い出す。自宅を出てから帰宅するまで（国内移動中含む）が対象。",star:2},

{q:"当座預金や利息の付かない普通預金など「決済用預金」は、預金保険制度により全額保護される。",a:"○",e:"決済用預金の3要件＝無利息・要求払・決済サービス提供。通常の預金は元本1,000万円＋利息まで。",star:3},
{q:"表面利率2%、残存期間5年の債券を額面100円あたり105円で購入した場合の最終利回り（単利）は（　）である。",c:["1. 0.95%","2. 1.90%","3. 2.86%"],a:"1. 0.95%",e:"｛2＋(100−105)÷5｝÷105×100＝(2−1)÷105×100≒0.95%。額面より高く買うと償還差損が出て利回りは表面利率より低くなる。",star:3},

{q:"勤続年数30年で退職金2,500万円を受け取った場合の退職所得の金額は（　）である。",c:["1. 500万円","2. 1,000万円","3. 1,500万円"],a:"1. 500万円",e:"控除額＝800万＋70万×(30−20)＝1,500万円。退職所得＝(2,500万−1,500万)×1/2＝500万円。「×1/2」を忘れないこと。",star:3},
{q:"アパートの貸付にあたり受け取った敷金のうち、退去時に返還を要しない部分の金額は、不動産所得の収入金額に算入する。",a:"○",e:"返還不要が確定した部分は受け取った年の収入。返還する部分は預り金なので収入にならない。",star:2},
{q:"幅員3mの2項道路に接する敷地では、道路の中心線から水平距離（　）後退した線が道路境界線とみなされる。",c:["1. 1m","2. 2m","3. 4m"],a:"2. 2m",e:"2項道路は中心線から2mセットバック。セットバック部分は建蔽率・容積率の計算上、敷地面積に算入されない。",star:3},

/* =========================================================
   状態管理
========================================================= */
let marks={};            // {qid: "o"|"x"}
let memoryOnly=false;
const qid=(sec,i)=>sec+"-"+i;

async function loadMarks(){
  try{
    const r=await window.storage.get("fp3-marks");
    if(r&&r.value)marks=JSON.parse(r.value);
  }catch(e){/* 初回はキーなし */}
}
let saveTimer=null;
function saveMarks(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await window.storage.set("fp3-marks",JSON.stringify(marks));}
    catch(e){memoryOnly=true;}
  },400);
}

/* =========================================================
   画面描画
========================================================= */
const app=document.getElementById("app");
let view={page:"home"};

function stats(sec){
  let o=0,x=0;
  sec.qs.forEach((_,i)=>{
    const m=marks[qid(sec.id,i)];
    if(m==="o")o++;else if(m==="x")x++;
  });
  return{o,x,total:sec.qs.length,none:sec.qs.length-o-x};
}
function totalStats(){
  let o=0,t=0;
  DATA.forEach(s=>{const st=stats(s);o+=st.o;t+=st.total;});
  return{o,t};
}

function renderHome(){
  const ts=totalStats();
  let h=`
  <header class="top">
    <h1 class="serif">FP3級 赤ペンドリル <span class="maru">○</span></h1>
    <p>解けたら○・間違えたら× を自分で採点。マークは自動保存されます。</p>
    <div class="totalbar">
      <div class="num">全体の○：<b>${ts.o}</b> / ${ts.t}問</div>
      <div class="bar"><i style="width:${ts.t?ts.o/ts.t*100:0}%"></i></div>
    </div>
  </header>`;

  const drills=DATA.filter(s=>!s.mock),mocks=DATA.filter(s=>s.mock);
  h+=`<div class="section-label">分野別ドリル</div><div class="cards">`;
  drills.forEach(s=>h+=cardHTML(s));
  h+=`</div>`;
  h+=`<div class="section-label">過去問演習（模試）</div>
      <p style="font-size:.82rem;color:var(--ink-soft);margin-bottom:6px">分野別ドリル（第1〜7章）を○で埋めてから挑戦。ドリルの知識だけで<b style="color:var(--shu)">90点以上</b>が取れる構成です。1問5点で自己採点してください。</p>
      <details style="font-size:.8rem;color:var(--ink-soft);margin-bottom:10px;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 12px">
        <summary style="cursor:pointer;font-weight:600;color:var(--ink)">📊 ドリル習得率と本番予想得点（公式公表問題で検証済み）</summary>
        <div style="margin-top:8px;line-height:1.9">
        全7章のドリルを何割○にできたかで、本番（学科60問）の予想得点はこの通り：<br>
        ・習得 50%　→ 約73点<br>
        ・習得 70%　→ 約83点<br>
        ・習得 80%　→ 約87点<br>
        ・習得 90%　→ 約92点<br>
        ・習得 100% → <b style="color:var(--shu)">約97点</b>（合格ライン60点）<br>
        <span style="font-size:.92em">※日本FP協会が公表した実際の学科試験（全60問）とドリル論点を1問ずつ照合して算出。</span>
        </div>
      </details>
      <div class="cards">`;
  mocks.forEach(s=>h+=cardHTML(s));
  h+=`</div>
  <p class="hint">${memoryOnly?"⚠ 保存機能に接続できないため、マークはこの画面を開いている間のみ保持されます。":"✎ ○×マークは端末に自動保存され、次回開いたときも引き継がれます。"}</p>`;
  app.innerHTML=h;
}

function cardHTML(s){
  const st=stats(s);
  const pct=st.total?st.o/st.total*100:0;
  const score=s.mock?`<span class="xcnt">得点換算 <em>${st.o*5}</em>点</span>`:`<span class="xcnt">×が <em>${st.x}</em> 問</span>`;
  return `
  <div class="card ${s.mock?"mock":""}">
    <div class="no">${s.mock?"MOCK":"DRILL"}</div>
    <h3>${s.name}</h3>
    <div class="sub">${s.sub}</div>
    <div class="stat"><b>${st.o}</b><span>/ ${st.total}問 ○</span>${score}</div>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div class="btnrow">
      <button class="btn shu" onclick="openQuiz('${s.id}','all')">すべて解く</button>
      <button class="btn" onclick="openQuiz('${s.id}','x')" ${st.x===0?"disabled":""}>×だけ解く</button>
      <button class="btn ghost" onclick="openQuiz('${s.id}','none')" ${st.none===0?"disabled":""}>未マークのみ</button>
    </div>
  </div>`;
}

function openQuiz(id,filter){
  view={page:"quiz",id,filter,revealed:{},showAll:false};
  renderQuiz();
  window.scrollTo(0,0);
}
function goHome(){view={page:"home"};renderHome();window.scrollTo(0,0);}

function filteredIdx(sec,filter){
  return sec.qs.map((_,i)=>i).filter(i=>{
    const m=marks[qid(sec.id,i)];
    if(filter==="x")return m==="x";
    if(filter==="none")return !m;
    return true;
  });
}

function renderQuiz(){
  const sec=DATA.find(s=>s.id===view.id);
  const idx=filteredIdx(sec,view.filter);
  const st=stats(sec);
  const fl={all:"すべて",x:"×のみ",none:"未マークのみ"}[view.filter];

  let h=`
  <div class="quizbar">
    <button class="btn ghost" onclick="goHome()">← ホーム</button>
    <div class="title">${sec.name} <span style="font-weight:400;color:var(--ink-soft);font-size:.8rem">（${fl}）</span></div>
    <div class="prog">○ <b>${st.o}</b>/${st.total}</div>
    <button class="btn" id="toggleAll" onclick="toggleAllAns()">${view.showAll?"解答をすべて隠す":"解答をすべて表示"}</button>
  </div>`;

  if(sec.mock){
    const pass=st.o*5>=90;
    h+=`<div class="scorebox">現在の得点：<b>${st.o*5}</b>点 / 100点
        <span class="pass ${pass?"ok":""}">${pass?"◎ 90点クリア！":"目標 90点以上"}</span>
        <span style="font-size:.78rem;color:var(--ink-soft)">（○の数×5点で自動計算）</span></div>`;
  }

  if(idx.length===0){
    h+=`<div class="empty">この条件に当てはまる問題はありません。<br><br><button class="btn shu" onclick="goHome()">ホームに戻る</button></div>`;
    app.innerHTML=h;return;
  }

  h+=`<div class="colhead"><div>問　題</div><div>解答・解説</div></div>`;

  idx.forEach(i=>{
    const q=sec.qs[i],id=qid(sec.id,i),m=marks[id];
    const shown=view.showAll||view.revealed[id];
    h+=`
    <div class="qrow">
      <div class="qcell ${m==="o"?"marked-o":m==="x"?"marked-x":""}">
        <div class="qno">問${i+1}<span class="star">${"★".repeat(q.star||2)}</span></div>
        <div class="qtext">${q.q}</div>
        ${q.c?`<div class="choices">${q.c.map(c=>`<div>${c}</div>`).join("")}</div>`:""}
        <div class="markrow">
          <span class="lbl">自己採点</span>
          <button class="mark ${m==="o"?"on":""}" onclick="setMark('${id}','o')" aria-label="正解">○</button>
          <button class="mark ${m==="x"?"on":""}" onclick="setMark('${id}','x')" aria-label="不正解">×</button>
        </div>
      </div>
      <div class="acell ${shown?"":"hidden"}" id="a-${id}">
        <div class="cover" onclick="revealAns('${id}')">タップで解答表示</div>
        <div class="inner">
          <div class="ans">答え：${q.a}　<button class="btn ghost" style="padding:2px 9px;font-size:.72rem" onclick="hideAns('${id}')">隠す</button></div>
          <div class="exp">${q.e}</div>
          ${q.g?`<div class="goro"><b>＋効率よく覚える：</b>${q.g}</div>`:""}
        </div>
      </div>
    </div>`;
  });

  h+=`<div class="backwrap"><button class="btn shu" onclick="goHome()">ホームに戻る</button></div>`;
  app.innerHTML=h;
}

function setMark(id,val){
  marks[id]=marks[id]===val?undefined:val;
  if(marks[id]===undefined)delete marks[id];
  saveMarks();
  renderQuiz();
}
function revealAns(id){view.revealed[id]=true;document.getElementById("a-"+id).classList.remove("hidden");}
function hideAns(id){view.revealed[id]=false;view.showAll=false;renderQuiz();}
function toggleAllAns(){view.showAll=!view.showAll;if(!view.showAll)view.revealed={};renderQuiz();}

/* 初期化 */
(async()=>{
  try{await loadMarks();}catch(e){memoryOnly=true;}
  renderHome();
})();
</script>
</body>
</html>
